<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EDF — ALFONSINA OREFICE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F8F7F4;--surface:#FFF;--border:#E5E2DA;--border2:#CCCAB8;--text:#1A1A18;--text2:#6B6960;--text3:#A09D94;--purple:#533AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;--green-bg:#E1F5EE;--green-text:#0F6E56;--amber-bg:#FAEEDA;--amber-text:#854F0B;--blue-bg:#E6F1FB;--blue-text:#0C447C;--red:#E24B4A;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:430px;margin:0 auto;min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar-back{background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.topbar-info{flex:1;min-width:0}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px}
.topbar-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer}
.content{flex:1;padding:16px;overflow-y:auto}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--purple)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px}
.sec-label:first-child{margin-top:0}
.client-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer}
.client-card:active{background:var(--bg)}
.client-card.done{border-left-color:#1D9E75}
.card-top{display:flex;align-items:flex-start;gap:8px}
.card-body{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.card-meta{font-size:12px;color:var(--text2);margin-top:3px}
.card-id{font-size:11px;color:var(--text3);margin-top:2px}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-ok{background:var(--green-bg);color:var(--green-text)}
.badge-pend{background:var(--amber-bg);color:var(--amber-text)}
.edf-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.pill-ccu{background:var(--blue-bg);color:var(--blue-text)}
.pill-ado{background:var(--green-bg);color:var(--green-text)}
.pill-gray{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.edf-card{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;background:var(--surface)}
.edf-card.filled{background:#F0FBF6;border-color:#A8DFC7}
.edf-card-title{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;font-weight:600;color:var(--text2)}
.edf-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--bg)}
.edf-row:last-child{border-bottom:none}
.edf-row-label{color:var(--text2)}
.edf-row-val{font-weight:500}
.edf-btns{display:flex;gap:8px;margin-top:10px}
.btn-sm{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-align:center;border:1px solid var(--border2);background:none;color:var(--text)}
.btn-sm:active{background:var(--bg)}
.btn-sm-red{border-color:var(--red);color:var(--red)}
.fab-wrap{padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);position:sticky;bottom:0}
.fab{width:100%;padding:14px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer}
.fab-out{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-row input,.form-row textarea{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;font-size:15px;color:var(--text);outline:none}
.form-row input:focus,.form-row textarea:focus{border-color:var(--purple);background:var(--surface)}
.form-row textarea{height:70px;resize:none}
.rg{display:flex;gap:8px;flex-wrap:wrap}
.ro{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1px solid var(--border2);border-radius:10px;cursor:pointer;font-size:14px;background:var(--bg)}
.ro input{width:auto;margin:0;accent-color:var(--purple)}
.ro.sel{background:var(--purple-bg);border-color:var(--purple);color:var(--purple-text);font-weight:500}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-cancel{flex:1;padding:13px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;font-size:15px;font-weight:500;cursor:pointer}
.btn-save{flex:1;padding:13px;background:var(--purple);border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;color:#fff}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:#1A1A18;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
.syncing{font-size:11px;color:var(--text3);text-align:center;padding:8px;}
</style>
</head>
<body>
<div class="app">

<div class="screen active" id="sc-lista">
  <div class="topbar">
    <div class="topbar-info">
      <div class="topbar-title">ALFONSINA OREFICE</div>
      <div class="topbar-sub" id="sub-progress">Cargando...</div>
    </div>
    <button class="topbar-btn" onclick="cargarDesdeSheets()">↺</button>
  </div>
  <div class="content">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="buscador" placeholder="Buscar cliente o ID..." oninput="renderLista()">
    </div>
    <div id="syncing-msg" class="syncing">Sincronizando con servidor...</div>
    <div id="lista"></div>
  </div>
  <div class="fab-wrap">
    <button class="fab fab-out" onclick="abrirModalNuevo()">+ Agregar cliente no listado</button>
  </div>
</div>

<div class="screen" id="sc-cliente">
  <div class="topbar">
    <button class="topbar-back" onclick="volverLista()">←</button>
    <div class="topbar-info">
      <div class="topbar-title" id="c-nombre">—</div>
      <div class="topbar-sub" id="c-sub">—</div>
    </div>
  </div>
  <div class="content">
    <div id="c-edfs"></div>
  </div>
  <div class="fab-wrap">
    <button class="fab" onclick="abrirModalEDF(null)">+ Agregar heladera</button>
  </div>
</div>

</div>

<div class="modal-bg" id="modal-edf">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-edf-titulo">Cargar heladera</div>
    <div class="form-row"><label class="form-label">N° de Serie *</label><input type="text" id="f-serie" placeholder="Ej: EDF-00234" autocomplete="off"></div>
    <div class="form-row"><label class="form-label">N° de Activo (opcional)</label><input type="text" id="f-activo" placeholder="Dejar vacío si no tiene"></div>
    <div class="form-row"><label class="form-label">Tipo EDF *</label>
      <div class="rg" id="rg-tipo">
        <label class="ro" onclick="selRG(this,'rg-tipo')"><input type="radio" name="f-tipo" value="CCU"> CCU — Cervezas</label>
        <label class="ro" onclick="selRG(this,'rg-tipo')"><input type="radio" name="f-tipo" value="ADO"> ADO — Aguas</label>
      </div>
    </div>
    <div class="form-row" id="row-puertas"><label class="form-label">Puertas *</label>
      <div class="rg" id="rg-puertas">
        <label class="ro" onclick="selRG(this,'rg-puertas')"><input type="radio" name="f-puertas" value="1"> 1 puerta</label>
        <label class="ro" onclick="selRG(this,'rg-puertas')"><input type="radio" name="f-puertas" value="2"> 2 puertas</label>
      </div>
    </div>
    <div class="form-row"><label class="form-label">Movimiento *</label>
      <div class="rg" id="rg-mov">
        <label class="ro" onclick="selRG(this,'rg-mov')"><input type="radio" name="f-mov" value="Instalacion"> Instalación</label>
        <label class="ro" onclick="selRG(this,'rg-mov')"><input type="radio" name="f-mov" value="Retiro"> Retiro</label>
        <label class="ro" onclick="selRG(this,'rg-mov')"><input type="radio" name="f-mov" value="Baja"> Baja</label>
        <label class="ro" onclick="selRG(this,'rg-mov')"><input type="radio" name="f-mov" value="No Gestionable"> No Gestionable</label>
      </div>
    </div>
    <div class="form-row"><label class="form-label">Observaciones</label><textarea id="f-obs" placeholder="Estado, roturas, novedades..."></textarea></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="cerrarModales()">Cancelar</button>
      <button class="btn-save" onclick="guardarEDF()">Guardar ✓</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-nuevo">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Agregar cliente no listado</div>
    <div class="form-row"><label class="form-label">ID Cliente (opcional)</label><input type="text" id="nc-id" placeholder="Si lo tenés"></div>
    <div class="form-row"><label class="form-label">Razón Social *</label><input type="text" id="nc-razon" placeholder="Nombre del negocio"></div>
    <div class="form-row"><label class="form-label">Rubro</label><input type="text" id="nc-rubro" placeholder="Almacén, kiosco, restaurante..."></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="cerrarModales()">Cancelar</button>
      <button class="btn-save" onclick="guardarNuevoCliente()">Agregar →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const VENDOR = "ALFONSINA OREFICE";
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzy-dvwJwWIhfjwNx4dUH3yLnCXMEvQKkV_9qV-PA_zATyNMZWRcOG9T9TP709jbE4S/exec";
const STORAGE_KEY = 'edf_v3_' + VENDOR.replace(/\s+/g,'_');
const SEED = [{"id":"7145","razon":"RONGVAUX NICOLAS","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7156","razon":"GUAN YANHUA","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7181","razon":"HERRERA LEANDRO ANDRES","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7344","razon":"BESSONE AGUSTIN","rubro":"ON PREMISE","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7590","razon":"GALLO LLORENTE EMILIO","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7790","razon":"MARCONI OMAR NELDO","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8244","razon":"GONZALEZ MARTA ALICIA","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8753","razon":"RONGVAUX NICOLAS","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"9320","razon":"GRUPO BDA S.A.","rubro":"BAR/CAFÉ","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7127","razon":"BUSTOS WALTER ALBERTO","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7132","razon":"YAN LINGXIANG","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7146","razon":"RONGVAUX NICOLAS","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7157","razon":"LIN XIAOYAN","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7161","razon":"LI HONGLIN","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7173","razon":"ZHENG XIAOFANG","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7224","razon":"CORNUCHO ANA GRACIELA","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7227","razon":"YAN MINGXING","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7230","razon":"CAIONE LILIAN MARIEL","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7275","razon":"LI GUOHUA","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7366","razon":"HUANG SHUJUAN","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7673","razon":"MALIZIA OSVALDO SANTIAGO","rubro":"BAR/CAFÉ","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8019","razon":"ROCCA TERESITA","rubro":"ON PREMISE","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8037","razon":"ROSALES DANIEL LUJAN","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8299","razon":"RONGVAUX NICOLAS","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8397","razon":"CORNUCHO ANA GRACIELA","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8445","razon":"RONGVAUX NICOLAS","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8577","razon":"PAPUK NELIDA RAQUEL","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8633","razon":"RONGVAUX NICOLAS","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"8848","razon":"RONGVAUX NICOLAS","rubro":"ALMACEN","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"9057","razon":"GALLO LLORENTE EMILIO","rubro":"ALMACEN","edfs_esperados":[{"tipo":"ADO","puertas":1}]},{"id":"9145","razon":"ZHENG KAIJIE","rubro":"AUTOSERVICIO","edfs_esperados":[{"tipo":"CCU","puertas":1}]},{"id":"7701","razon":"EMPRENDIMIENTOS DON LINO GASTRO S.R.L","rubro":"","edfs_esperados":[{"tipo":"CCU","puertas":1},{"tipo":"CCU","puertas":1}]},{"id":"8700","razon":"SOBRAL HERNAN ALEJANDRO","rubro":"","edfs_esperados":[{"tipo":"ADO","puertas":1}]},{"id":"9000","razon":"LAURENCO MARIANO ALBERTO","rubro":"","edfs_esperados":[{"tipo":"CCU","puertas":1},{"tipo":"CCU","puertas":1}]},{"id":"9340","razon":"MORENO JULIANA BELEN","rubro":"","edfs_esperados":[{"tipo":"CCU","puertas":1},{"tipo":"CCU","puertas":1}]},{"id":"9395","razon":"CORNUCHO ANA GRACIELA","rubro":"","edfs_esperados":[{"tipo":"CCU","puertas":1},{"tipo":"CCU","puertas":1}]}];

let clientes = [];
let clienteIdx = null;
let edfEditIdx = null;

function cargarEstadoLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      clientes = SEED.map(s => {
        const g = saved.find(x => x.id === s.id);
        return {...s, edfs: g ? (g.edfs||[]) : []};
      });
      saved.forEach(g => {
        if (g._nuevo && !clientes.find(c => c._tmpId === g._tmpId))
          clientes.push({...g});
      });
    } else {
      clientes = SEED.map(s => ({...s, edfs:[]}));
    }
  } catch(e) {
    clientes = SEED.map(s => ({...s, edfs:[]}));
  }
}

async function cargarDesdeSheets() {
  document.getElementById('syncing-msg').style.display = 'block';
  try {
    const res = await fetch(SHEETS_URL + '?vendedor=' + encodeURIComponent(VENDOR) + '&t=' + Date.now());
    const data = await res.json();
    if (data && data.length > 1) {
      const headers = data[0];
      const rows = data.slice(1);
      const idIdx = headers.indexOf('ID Cliente');
      const serieIdx = headers.indexOf('N° Serie');
      const activoIdx = headers.indexOf('N° Activo');
      const tipoIdx = headers.indexOf('Tipo EDF');
      const puertasIdx = headers.indexOf('Puertas');
      const movIdx = headers.indexOf('Movimiento');
      const obsIdx = headers.indexOf('Observaciones');
      const nuevoIdx = headers.indexOf('Cliente Nuevo');
      const razonIdx = headers.indexOf('Razón Social');
      const rubroIdx = headers.indexOf('Rubro');

      // Agrupar filas por ID cliente
      const porId = {};
      rows.forEach(row => {
        const id = String(row[idIdx]||'');
        if (!porId[id]) porId[id] = [];
        porId[id].push({
          serie: row[serieIdx]||'',
          activo: row[activoIdx]||'',
          tipo: row[tipoIdx]||'',
          puertas: parseInt(row[puertasIdx])||1,
          mov: row[movIdx]||'',
          obs: row[obsIdx]||''
        });
      });

      // Aplicar al estado
      clientes = SEED.map(s => {
        const edfsSheets = porId[String(s.id||'')] || [];
        const local = clientes.find(c => c.id === s.id);
        const edfsLocal = local ? (local.edfs||[]) : [];
        // Usar sheets si tiene mas datos, sino local
        const edfs = edfsSheets.length >= edfsLocal.length ? edfsSheets : edfsLocal;
        return {...s, edfs};
      });

      // Clientes nuevos del sheet
      rows.forEach(row => {
        if (row[nuevoIdx] === 'Sí') {
          const razon = row[razonIdx]||'';
          if (razon && !clientes.find(c => c.razon === razon && c._nuevo)) {
            clientes.push({
              _tmpId: 'SHEET_' + Date.now() + Math.random(),
              id: row[idIdx]||null,
              razon,
              rubro: row[rubroIdx]||'',
              edfs_esperados:[],
              edfs: porId[String(row[idIdx]||'')] || [],
              _nuevo: true
            });
          }
        }
      });

      guardarEstado();
      toast('Sincronizado ✓');
    }
  } catch(e) {
    console.warn('Error sync:', e);
  }
  document.getElementById('syncing-msg').style.display = 'none';
  renderLista();
}

function guardarEstado() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(clientes)); } catch(e) {}
}

function mostrarPantalla(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function volverLista() {
  mostrarPantalla('sc-lista');
  renderLista();
}

function abrirCliente(idx) {
  clienteIdx = idx;
  const c = clientes[idx];
  document.getElementById('c-nombre').textContent = c.razon;
  document.getElementById('c-sub').textContent = (c.rubro||'—') + (c.id ? ' · ID: ' + c.id : ' · Cliente nuevo');
  mostrarPantalla('sc-cliente');
  renderEdfs();
}

function renderLista() {
  const q = (document.getElementById('buscador').value||'').toLowerCase();
  const pendientes = [], completados = [];
  clientes.forEach((c,i) => {
    const match = c.razon.toLowerCase().includes(q) ||
      (c.id && String(c.id).includes(q)) ||
      (c.rubro && c.rubro.toLowerCase().includes(q));
    if (!match) return;
    const esp = c.edfs_esperados ? c.edfs_esperados.length : 0;
    const carg = c.edfs ? c.edfs.length : 0;
    if (esp === 0 || carg < esp) pendientes.push({c,i});
    else completados.push({c,i});
  });

  const total = clientes.length;
  const totalEsp = clientes.reduce((a,c)=>a+(c.edfs_esperados?c.edfs_esperados.length:0),0);
  const totalCarg = clientes.reduce((a,c)=>a+(c.edfs?c.edfs.length:0),0);
  document.getElementById('sub-progress').textContent =
    completados.length+'/'+total+' clientes · '+totalCarg+'/'+totalEsp+' EDF';

  let html = '';
  if (pendientes.length) {
    html += '<div class="sec-label">Pendientes ('+pendientes.length+')</div>';
    pendientes.forEach(({c,i}) => { html += cardHTML(c,i); });
  }
  if (completados.length) {
    html += '<div class="sec-label" style="margin-top:'+(pendientes.length?'16px':'0')+'">Completados ('+completados.length+')</div>';
    completados.forEach(({c,i}) => { html += cardHTML(c,i); });
  }
  if (!pendientes.length && !completados.length) html = '<div class="empty">Sin resultados</div>';
  document.getElementById('lista').innerHTML = html;
}

function cardHTML(c,i) {
  const edfs = c.edfs||[];
  const esp = c.edfs_esperados||[];
  const isDone = esp.length > 0 && edfs.length >= esp.length;
  const badge = isDone
    ? '<span class="badge badge-ok">'+edfs.length+' EDF ✓</span>'
    : '<span class="badge badge-pend">'+edfs.length+'/'+esp.length+' EDF</span>';
  const pills = esp.map((e,j) => {
    const filled = edfs[j];
    const cls = filled ? 'pill pill-'+e.tipo.toLowerCase() : 'pill pill-gray';
    return '<span class="'+cls+'">'+e.tipo+' '+(e.puertas>1?'2p':'1p')+(filled?' ✓':'')+'</span>';
  }).join('');
  return '<div class="client-card '+(isDone?'done':'')+'" onclick="abrirCliente('+i+')">'+
    '<div class="card-top"><div class="card-body">'+
    '<div class="card-name">'+esc(c.razon)+'</div>'+
    '<div class="card-meta">'+esc(c.rubro||'—')+'</div>'+
    '<div class="card-id">ID: '+esc(c.id?String(c.id):'Nuevo')+'</div>'+
    '</div>'+badge+'</div>'+
    (pills?'<div class="edf-pills">'+pills+'</div>':'')+
    '</div>';
}

function renderEdfs() {
  const c = clientes[clienteIdx];
  const edfs = c.edfs||[];
  const esp = c.edfs_esperados||[];
  let html = '';
  esp.forEach((e,i) => {
    const filled = edfs[i];
    if (filled) {
      html += edfCardFilled(filled,i,e);
    } else {
      html += '<div class="edf-card">'+
        '<div class="edf-card-title"><span class="pill pill-'+e.tipo.toLowerCase()+'">'+e.tipo+'</span>'+
        'Heladera '+(i+1)+' — '+e.puertas+' puerta'+(e.puertas>1?'s':'')+' — Pendiente</div>'+
        '<button class="btn-sm" style="width:100%;padding:11px" onclick="abrirModalEDF('+i+')">+ Cargar datos</button>'+
        '</div>';
    }
  });
  for (let i = esp.length; i < edfs.length; i++) {
    html += edfCardFilled(edfs[i],i,null);
  }
  if (!html) html = '<div class="empty">Tocá el botón para agregar la primera heladera</div>';
  document.getElementById('c-edfs').innerHTML = html;
}

function edfCardFilled(e,i,esp) {
  const label = esp ? 'Heladera '+(i+1)+' — '+esp.tipo+' '+esp.puertas+'p ✓' : 'Heladera adicional '+(i+1)+' ✓';
  return '<div class="edf-card filled">'+
    '<div class="edf-card-title"><span class="pill pill-'+e.tipo.toLowerCase()+'">'+e.tipo+'</span>'+label+'</div>'+
    '<div class="edf-row"><span class="edf-row-label">N° Serie</span><span class="edf-row-val">'+esc(e.serie||'—')+'</span></div>'+
    (e.activo?'<div class="edf-row"><span class="edf-row-label">N° Activo</span><span class="edf-row-val">'+esc(e.activo)+'</span></div>':'')+
    '<div class="edf-row"><span class="edf-row-label">Movimiento</span><span class="edf-row-val">'+esc(e.mov)+'</span></div>'+
    (e.obs?'<div class="edf-row"><span class="edf-row-label">Obs.</span><span class="edf-row-val">'+esc(e.obs)+'</span></div>':'')+
    '<div class="edf-btns">'+
    '<button class="btn-sm" onclick="abrirModalEDF('+i+')">✏️ Editar</button>'+
    '<button class="btn-sm btn-sm-red" onclick="eliminarEDF('+i+')">🗑 Borrar</button>'+
    '</div></div>';
}

function abrirModalEDF(idx) {
  edfEditIdx = idx;
  const c = clientes[clienteIdx];
  const esp = c.edfs_esperados||[];
  const edfs = c.edfs||[];
  document.getElementById('f-serie').value='';
  document.getElementById('f-activo').value='';
  document.getElementById('f-obs').value='';
  document.querySelectorAll('.ro').forEach(el=>{el.classList.remove('sel');el.querySelector('input').checked=false;});
  let titulo='Agregar heladera', tipoD=null, puertasD=null;
  if (idx !== null) {
    const ex = edfs[idx];
    if (ex) {
      titulo='Editar heladera '+(idx+1);
      document.getElementById('f-serie').value=ex.serie||'';
      document.getElementById('f-activo').value=ex.activo||'';
      document.getElementById('f-obs').value=ex.obs||'';
      tipoD=ex.tipo; puertasD=String(ex.puertas);
      setRadio('f-mov',ex.mov);
    } else if (esp[idx]) {
      titulo='Cargar heladera '+(idx+1);
      tipoD=esp[idx].tipo; puertasD=String(esp[idx].puertas);
    }
  }
  document.getElementById('modal-edf-titulo').textContent=titulo;
  if(tipoD) setRadio('f-tipo',tipoD);
  if(puertasD) setRadio('f-puertas',puertasD);
  actualizarPuertas();
  document.getElementById('modal-edf').classList.add('open');
}

function actualizarPuertas() {
  const t=document.querySelector('input[name="f-tipo"]:checked');
  document.getElementById('row-puertas').style.display=(t&&t.value==='ADO')?'none':'';
}
document.querySelectorAll('input[name="f-tipo"]').forEach(i=>i.addEventListener('change',actualizarPuertas));

function guardarEDF() {
  const serie=document.getElementById('f-serie').value.trim();
  const tipo=document.querySelector('input[name="f-tipo"]:checked');
  const puertas=document.querySelector('input[name="f-puertas"]:checked');
  const mov=document.querySelector('input[name="f-mov"]:checked');
  if(!serie){alert('El número de serie es obligatorio.');return;}
  if(!tipo){alert('Seleccioná el tipo.');return;}
  if(!puertas&&tipo.value!=='ADO'){alert('Indicá la cantidad de puertas.');return;}
  if(!mov){alert('Seleccioná el movimiento.');return;}
  const edf={serie,activo:document.getElementById('f-activo').value.trim(),tipo:tipo.value,puertas:puertas?parseInt(puertas.value):1,mov:mov.value,obs:document.getElementById('f-obs').value.trim()};
  const c=clientes[clienteIdx];
  if(!c.edfs)c.edfs=[];
  if(edfEditIdx!==null){c.edfs[edfEditIdx]=edf;}else{c.edfs.push(edf);}
  guardarEstado();
  syncSheets(c,edf);
  cerrarModales();
  renderEdfs();
  renderLista();
  toast('Guardado y enviado ✓');
}

function eliminarEDF(idx) {
  if(!confirm('¿Borrar esta heladera?'))return;
  clientes[clienteIdx].edfs.splice(idx,1);
  guardarEstado();
  renderEdfs();
  renderLista();
  toast('Eliminado');
}

function abrirModalNuevo() {
  ['nc-id','nc-razon','nc-rubro'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-nuevo').classList.add('open');
}

function guardarNuevoCliente() {
  const razon=document.getElementById('nc-razon').value.trim();
  if(!razon){alert('La razón social es obligatoria.');return;}
  const nuevo={_tmpId:'TMP'+Date.now(),id:document.getElementById('nc-id').value.trim()||null,razon,rubro:document.getElementById('nc-rubro').value.trim(),edfs_esperados:[],edfs:[],_nuevo:true};
  clientes.push(nuevo);
  guardarEstado();
  cerrarModales();
  toast('Cliente agregado');
  setTimeout(()=>abrirCliente(clientes.length-1),150);
}

function cerrarModales() {
  document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
}

function selRG(el,grupo) {
  document.querySelectorAll('#'+grupo+' .ro').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
}

function setRadio(name,val) {
  const inp=document.querySelector('input[name="'+name+'"][value="'+val+'"]');
  if(inp){inp.checked=true;inp.closest('.ro').classList.add('sel');}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

async function syncSheets(cliente,edf) {
  try {
    await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({vendedor:VENDOR,id_cliente:cliente.id||'',razon:cliente.razon,rubro:cliente.rubro||'',cliente_nuevo:cliente._nuevo?'Sí':'No',serie:edf.serie||'',activo:edf.activo||'',tipo:edf.tipo,puertas:edf.puertas,mov:edf.mov,obs:edf.obs||''})
    });
  }catch(e){console.warn('Sync error',e);}
}

document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)cerrarModales();}));

// Init: cargar local primero, luego sincronizar con sheets
cargarEstadoLocal();
renderLista();
cargarDesdeSheets();
</script>
</body>
</html>
