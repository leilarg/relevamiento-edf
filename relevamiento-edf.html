<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Relevamiento EDF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F8F7F4;--surface:#FFF;--border:#E5E2DA;--border2:#CCCAB8;--text:#1A1A18;--text2:#6B6960;--text3:#A09D94;--purple:#533AB7;--green-bg:#E1F5EE;--green-text:#0F6E56;--amber-bg:#FAEEDA;--amber-text:#854F0B;--blue-bg:#E6F1FB;--blue-text:#0C447C;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.app{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-n{font-size:28px;font-weight:700}
.stat-l{font-size:12px;color:var(--text2);margin-top:4px}
.toolbar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-purple{background:var(--purple);color:#fff}
.btn-outline{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.btn:hover{opacity:.9}
.vendor-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.vendor-header{padding:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.vendor-header:hover{background:var(--bg)}
.vendor-name{font-size:16px;font-weight:600}
.vendor-stats{font-size:13px;color:var(--text2);margin-top:2px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;width:200px}
.progress-fill{height:100%;background:var(--purple);border-radius:2px}
.vendor-body{display:none;border-top:1px solid var(--border)}
.vendor-body.open{display:block}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{background:var(--bg);padding:10px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:var(--bg)}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
.pill-ccu{background:var(--blue-bg);color:var(--blue-text)}
.pill-ado{background:var(--green-bg);color:var(--green-text)}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-ok{background:var(--green-bg);color:var(--green-text)}
.badge-pend{background:var(--amber-bg);color:var(--amber-text)}
.loading{text-align:center;padding:60px;color:var(--text2)}
.error{background:#FEE;border:1px solid #FCC;border-radius:8px;padding:16px;margin-bottom:20px;color:#900;font-size:13px}
.last-update{font-size:12px;color:var(--text3);margin-left:auto}
.filter-wrap{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-wrap select{padding:6px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text)}
.filter-wrap input{padding:6px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;flex:1;min-width:150px}
</style>
</head>
<body>
<div class="app">
  <h1>Panel administrador — EDF</h1>
  <p class="sub" id="last-update">Cargando datos desde Google Sheets...</p>

  <div id="error-box" style="display:none" class="error"></div>
  <div class="stats" id="stats"><div class="loading">⏳ Cargando...</div></div>

  <div class="toolbar">
    <button class="btn btn-purple" onclick="exportarExcel()">📥 Exportar a Excel</button>
    <button class="btn btn-outline" onclick="cargarDatos()">↺ Actualizar</button>
  </div>

  <div id="vendors"><div class="loading">⏳ Cargando datos...</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzy-dvwJwWIhfjwNx4dUH3yLnCXMEvQKkV_9qV-PA_zATyNMZWRcOG9T9TP709jbE4S/exec";
let allRows = [];
let headers = [];

async function cargarDatos() {
  document.getElementById('last-update').textContent = 'Actualizando...';
  document.getElementById('error-box').style.display = 'none';
  try {
    const res = await fetch(SHEETS_URL + '?t=' + Date.now());
    const data = await res.json();
    if (!data || data.length < 2) {
      mostrarError('La planilla está vacía o no tiene datos todavía.');
      return;
    }
    headers = data[0];
    allRows = data.slice(1);
    document.getElementById('last-update').textContent = 'Última actualización: ' + new Date().toLocaleString('es-AR');
    renderTodo();
  } catch(e) {
    mostrarError('No se pudo conectar con Google Sheets. Verificá tu conexión. (' + e.message + ')');
  }
}

function mostrarError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('last-update').textContent = 'Error al cargar';
}

function col(row, nombre) {
  const i = headers.indexOf(nombre);
  return i >= 0 ? row[i] : '';
}

function renderTodo() {
  // Agrupar por vendedor
  const porVendedor = {};
  allRows.forEach(row => {
    const v = col(row, 'Vendedor');
    if (!porVendedor[v]) porVendedor[v] = [];
    porVendedor[v].push(row);
  });

  // Stats globales
  const totalEDF = allRows.length;
  const vendedores = Object.keys(porVendedor);
  const movs = {};
  allRows.forEach(row => {
    const m = col(row, 'Movimiento');
    movs[m] = (movs[m]||0) + 1;
  });

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-n">${totalEDF}</div><div class="stat-l">EDF relevados</div></div>
    <div class="stat"><div class="stat-n">${vendedores.length}</div><div class="stat-l">Vendedores activos</div></div>
    <div class="stat"><div class="stat-n">${movs['Instalacion']||0}</div><div class="stat-l">Instalaciones</div></div>
    <div class="stat"><div class="stat-n">${movs['Retiro']||0}</div><div class="stat-l">Retiros</div></div>
    <div class="stat"><div class="stat-n">${movs['Baja']||0}</div><div class="stat-l">Bajas</div></div>
    <div class="stat"><div class="stat-n">${movs['No Gestionable']||0}</div><div class="stat-l">No Gestionables</div></div>
  `;

  document.getElementById('vendors').innerHTML = vendedores.map(v => {
    const rows = porVendedor[v];
    const tableRows = rows.map(row => {
      const tipo = col(row,'Tipo EDF');
      const pillClass = tipo === 'CCU' ? 'pill-ccu' : 'pill-ado';
      return `<tr>
        <td>${col(row,'ID Cliente')}</td>
        <td><strong>${col(row,'Razón Social')}</strong></td>
        <td>${col(row,'Rubro')}</td>
        <td><span class="pill ${pillClass}">${tipo}</span></td>
        <td>${col(row,'Puertas')}</td>
        <td>${col(row,'N° Serie')}</td>
        <td>${col(row,'N° Activo')||'—'}</td>
        <td><span class="badge badge-ok">${col(row,'Movimiento')}</span></td>
        <td style="color:var(--text3);font-size:11px">${col(row,'Fecha')||''}</td>
      </tr>`;
    }).join('');

    return `<div class="vendor-section">
      <div class="vendor-header" onclick="toggle('vb-${v.replace(/\s/g,'_')}')">
        <div>
          <div class="vendor-name">${v}</div>
          <div class="vendor-stats">${rows.length} EDF relevados</div>
        </div>
        <span class="badge badge-ok">${rows.length} ✓</span>
      </div>
      <div class="vendor-body" id="vb-${v.replace(/\s/g,'_')}">
        <div style="overflow-x:auto">
        <table class="table">
          <thead><tr>
            <th>ID</th><th>Razón Social</th><th>Rubro</th><th>Tipo</th>
            <th>Puertas</th><th>N° Serie</th><th>N° Activo</th><th>Movimiento</th><th>Fecha</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function exportarExcel() {
  if (!allRows.length) { alert('No hay datos para exportar.'); return; }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...allRows]);
  XLSX.utils.book_append_sheet(wb, ws, 'Relevamiento EDF');
  XLSX.writeFile(wb, 'relevamiento_edf_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

cargarDatos();
setInterval(cargarDatos, 60000); // actualizar cada 1 minuto
</script>
</body>
</html>
