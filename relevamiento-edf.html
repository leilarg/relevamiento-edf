<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Relevamiento EDF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F8F7F4;--surface:#FFF;--border:#E5E2DA;--border2:#CCCAB8;--text:#1A1A18;--text2:#6B6960;--text3:#A09D94;--purple:#533AB7;--purple-bg:#EEEDFE;--green-bg:#E1F5EE;--green-text:#0F6E56;--amber-bg:#FAEEDA;--amber-text:#854F0B;--blue-bg:#E6F1FB;--blue-text:#0C447C;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.app{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-n{font-size:28px;font-weight:700}
.stat-l{font-size:12px;color:var(--text2);margin-top:4px}
.vendor-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.vendor-header{padding:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border)}
.vendor-header:hover{background:var(--bg)}
.vendor-name{font-size:16px;font-weight:600}
.vendor-stats{font-size:13px;color:var(--text2)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--purple);border-radius:2px}
.vendor-body{display:none;padding:12px}
.vendor-body.open{display:block}
.client-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 12px;border-radius:8px;margin-bottom:6px;background:var(--bg)}
.client-row.done{background:#F0FBF6}
.client-name{font-size:13px;font-weight:500}
.client-meta{font-size:11px;color:var(--text2);margin-top:2px}
.client-edfs{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.pill-ccu{background:var(--blue-bg);color:var(--blue-text)}
.pill-ado{background:var(--green-bg);color:var(--green-text)}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-left:8px}
.badge-ok{background:var(--green-bg);color:var(--green-text)}
.badge-pend{background:var(--amber-bg);color:var(--amber-text)}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-purple{background:var(--purple);color:#fff;margin-bottom:24px}
.btn-purple:hover{opacity:.9}
.note{font-size:12px;color:var(--text3);margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <h1>Panel administrador — EDF</h1>
  <p class="sub">Los datos se actualizan en tiempo real desde Google Sheets. Este panel lee el estado guardado localmente en cada dispositivo.</p>
  
  <div class="stats" id="stats"></div>
  
  <button class="btn btn-purple" onclick="exportarExcel()">📥 Exportar todo a Excel</button>
  <p class="note">El Excel incluye todos los datos cargados en Google Sheets.</p>

  <div id="vendors"></div>
</div>

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzy-dvwJwWIhfjwNx4dUH3yLnCXMEvQKkV_9qV-PA_zATyNMZWRcOG9T9TP709jbE4S/exec";

function cargarTodos() {
  const result = {};
  VENDORS.forEach(v => {
    const key = 'edf_v3_' + v.replace(/\s+/g,'_');
    try {
      const raw = localStorage.getItem(key);
      if (raw) {
        const saved = JSON.parse(raw);
        const clientes = SEED[v].map(s => {
          const g = saved.find(x => x.id === s.id);
          return {...s, edfs: g ? (g.edfs||[]) : []};
        });
        saved.forEach(g => {
          if (g._nuevo && !clientes.find(c => c._tmpId === g._tmpId)) clientes.push({...g});
        });
        result[v] = clientes;
      } else {
        result[v] = SEED[v].map(s => ({...s, edfs:[]}));
      }
    } catch(e) {
      result[v] = SEED[v].map(s => ({...s, edfs:[]}));
    }
  });
  return result;
}

function render() {
  const todos = cargarTodos();
  let totalCli=0, totalEdf=0, cargadosEdf=0, completadosCli=0;
  
  VENDORS.forEach(v => {
    const cl = todos[v];
    totalCli += cl.length;
    cl.forEach(c => {
      const esp = c.edfs_esperados ? c.edfs_esperados.length : 0;
      const carg = c.edfs ? c.edfs.length : 0;
      totalEdf += esp;
      cargadosEdf += carg;
      if (esp > 0 && carg >= esp) completadosCli++;
    });
  });

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-n">${totalCli}</div><div class="stat-l">Clientes totales</div></div>
    <div class="stat"><div class="stat-n" style="color:#0F6E56">${completadosCli}</div><div class="stat-l">Clientes completados</div></div>
    <div class="stat"><div class="stat-n">${totalEdf}</div><div class="stat-l">EDF esperados</div></div>
    <div class="stat"><div class="stat-n" style="color:#533AB7">${cargadosEdf}</div><div class="stat-l">EDF relevados</div></div>
  `;

  document.getElementById('vendors').innerHTML = VENDORS.map(v => {
    const cl = todos[v];
    const esp = cl.reduce((a,c) => a+(c.edfs_esperados?c.edfs_esperados.length:0),0);
    const carg = cl.reduce((a,c) => a+(c.edfs?c.edfs.length:0),0);
    const done = cl.filter(c => c.edfs_esperados && c.edfs_esperados.length>0 && c.edfs && c.edfs.length>=c.edfs_esperados.length).length;
    const pct = cl.length>0 ? Math.round(done/cl.length*100) : 0;
    const rows = cl.map(c => {
      const edfs = c.edfs||[];
      const isDone = c.edfs_esperados && c.edfs_esperados.length>0 && edfs.length>=c.edfs_esperados.length;
      const pills = edfs.map(e => `<span class="pill pill-${e.tipo.toLowerCase()}">${e.tipo} · ${e.serie||'?'} · ${e.mov}</span>`).join('');
      return `<div class="client-row ${isDone?'done':''}">
        <div>
          <div class="client-name">${c.razon}</div>
          <div class="client-meta">${c.rubro||'—'} · ID: ${c.id||'Nuevo'}</div>
          ${pills ? '<div class="client-edfs">'+pills+'</div>' : ''}
        </div>
        <span class="badge ${isDone?'badge-ok':'badge-pend'}">${edfs.length}/${c.edfs_esperados?c.edfs_esperados.length:0}</span>
      </div>`;
    }).join('');
    return `<div class="vendor-section">
      <div class="vendor-header" onclick="toggleVendor('v-${v.replace(/\s/g,'-')}')">
        <div>
          <div class="vendor-name">${v}</div>
          <div class="vendor-stats">${done}/${cl.length} clientes · ${carg}/${esp} EDF</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <span class="badge ${pct===100?'badge-ok':'badge-pend'}">${pct}%</span>
      </div>
      <div class="vendor-body" id="v-${v.replace(/\s/g,'-')}">${rows}</div>
    </div>`;
  }).join('');
}

function toggleVendor(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function exportarExcel() {
  const todos = cargarTodos();
  const rows = [['Vendedor','ID Cliente','Razón Social','Rubro','Cliente Nuevo','N° Serie','N° Activo','Tipo EDF','Puertas','Movimiento','Observaciones']];
  VENDORS.forEach(v => {
    todos[v].forEach(c => {
      const edfs = c.edfs||[];
      if (!edfs.length) {
        rows.push([v, c.id||'', c.razon, c.rubro||'', c._nuevo?'Sí':'No','','','','','','']);
      } else {
        edfs.forEach(e => {
          rows.push([v, c.id||'', c.razon, c.rubro||'', c._nuevo?'Sí':'No', e.serie||'', e.activo||'', e.tipo, e.puertas, e.mov, e.obs||'']);
        });
      }
    });
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:18},{wch:10},{wch:28},{wch:14},{wch:12},{wch:14},{wch:12},{wch:8},{wch:7},{wch:14},{wch:26}];
  XLSX.utils.book_append_sheet(wb, ws, 'Relevamiento EDF');
  XLSX.writeFile(wb, 'relevamiento_edf_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

render();
setInterval(render, 30000); // refrescar cada 30s
